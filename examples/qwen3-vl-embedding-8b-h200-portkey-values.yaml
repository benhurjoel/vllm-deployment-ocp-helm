model:
  repoId: "Qwen/Qwen3-VL-Embedding-8B"
  requiresToken: false
  trustRemoteCode: true

image:
  repository: "vllm/vllm-openai"
  tag: "v0.19.0"

downloader:
  image:
    repository: "vllm/vllm-openai"
    tag: "v0.19.0"
  xdgCacheHome: "/tmp/.cache"
  hfHubCache: "/tmp/.cache/huggingface/hub"
  transformersCache: "/tmp/.cache/huggingface/transformers"

apiKeySecret:
  enabled: true
  create: false
  name: "vllm-api-key"
  key: "api-key"

cacheVolume:
  enabled: true
  mountPath: "/tmp/.cache"
  rootCacheMountPath: "/.cache"

proxy:
  enabled: true
  httpProxy: "http://proxy.example.com:8080"
  httpsProxy: "http://proxy.example.com:8080"
  noProxy: ".svc,.cluster.local,localhost,127.0.0.1,10.0.0.0/8"
  nodeUseEnvProxy: true

route:
  enabled: true
  host: "qwen3-vl-embedding-8b.apps.example.openshift.com"

modelStorage:
  size: 120Gi
  storageClassName: "ocs-storagecluster-ceph-rbd"

vllm:
  servedModelName: "qwen3-vl-embedding-8b"
  task: ""
  runner: "pooling"
  convert: "embed"
  tensorParallelSize: 1
  maxModelLen: "16384"
  dtype: "bfloat16"
  gpuMemoryUtilization: 0.80
  home: "/tmp/home"
  xdgCacheHome: "/tmp/.cache"
  hfHubCache: "/tmp/.cache/huggingface/hub"
  transformersCache: "/tmp/.cache/huggingface/transformers"
  torchHome: "/tmp/.cache/torch"
  sentenceTransformersHome: "/tmp/.cache/sentence_transformers"
  matplotlibConfigDir: "/tmp/.cache/matplotlib"
  extraEnvs:
    - name: "VLLM_LOGGING_LEVEL"
      value: "INFO"
    - name: "VLLM_WORKER_MULTIPROC_METHOD"
      value: "spawn"
  extraArgs:
    - "--distributed-executor-backend"
    - "mp"

resources:
  requests:
    cpu: "8"
    memory: 48Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "16"
    memory: 96Gi
    nvidia.com/gpu: "1"

nodeAffinity:
  enabled: true
  type: "requiredDuringSchedulingIgnoredDuringExecution"
  nodeSelectorTerms:
    - matchExpressions:
        - key: "nvidia.com/gpu.present"
          operator: "In"
          values:
            - "true"
        - key: "nvidia.com/gpu.product"
          operator: "In"
          values:
            - "NVIDIA-H200"

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

startupProbe:
  port: 8000

readinessProbe:
  port: 8000

livenessProbe:
  port: 8000

openshift:
  scc:
    anyuid:
      enabled: true
